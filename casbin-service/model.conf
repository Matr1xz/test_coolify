# Casbin RBAC Model Configuration
# Request definition: subject (role), object (path), action (method)
[request_definition]
r = sub, obj, act

# Policy definition
[policy_definition]
p = sub, obj, act

# Role definition (for role inheritance if needed)
[role_definition]
g = _, _

# Policy effect: allow if any matching policy allows
[policy_effect]
e = some(where (p.eft == allow))

# Matchers: how to match requests against policies
# Using keyMatch2 for path patterns like /lab/*
[matchers]
m = r.sub == p.sub && keyMatch2(r.obj, p.obj) && r.act == p.act
