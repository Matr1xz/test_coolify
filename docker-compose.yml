services:
  # ============== KONG DATABASE ==============
  kong-database:
    image: postgres:15
    container_name: kong-database
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong
    ports:
      - "5432:5432"
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    networks:
      - cyberlabx-network

  kong-migrations:
    image: kong:3.6
    container_name: kong-migrations
    depends_on:
      - kong-database
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong
    command: kong migrations bootstrap
    restart: on-failure
    networks:
      - cyberlabx-network

  kong:
    image: kong:3.6
    container_name: kong
    depends_on:
      - kong-migrations
      - keycloak
      - casbin-authz
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_URL: http://localhost:18002
      KONG_ADMIN_GUI_API_URL: http://localhost:18001
      KONG_LOG_LEVEL: notice
      # Enable plugins including serverless functions
      KONG_PLUGINS: bundled,pre-function,post-function
      KONG_UNTRUSTED_LUA: "on"
    ports:
      - "18000:8000"   # Proxy HTTP
      - "18443:8443"   # Proxy HTTPS
      - "18001:8001"   # Admin API
      - "18002:8002"   # Kong Manager GUI
    restart: unless-stopped
    networks:
      - cyberlabx-network

  # ============== KEYCLOAK (Authentication) ==============
  keycloak-database:
    image: postgres:15
    container_name: keycloak-database
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_DB: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - cyberlabx-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    depends_on:
      - keycloak-database
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-database:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    command: start-dev
    ports:
      - "8080:8080"   # Keycloak UI
    restart: unless-stopped
    networks:
      - cyberlabx-network

  # ============== CASBIN (Authorization) ==============
  casbin-authz:
    build: ./casbin-service
    container_name: casbin-authz
    ports:
      - "8082:8082"
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: cyberlabx
    restart: unless-stopped
    networks:
      - cyberlabx-network

  # ============== WEB UI (Frontend) ==============
  web-ui:
    build: ./web-ui
    container_name: web-ui
    ports:
      - "3000:80"
    depends_on:
      - keycloak
      - kong
    environment:
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_REALM: cyberlabx
      KEYCLOAK_CLIENT_ID: cyberlabx-web
      KONG_URL: http://localhost:18000
    restart: unless-stopped
    networks:
      - cyberlabx-network

volumes:
  kong_db_data:
  keycloak_db_data:

networks:
  cyberlabx-network:
    driver: bridge
